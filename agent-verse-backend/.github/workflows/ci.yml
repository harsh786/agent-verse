name: backend-ci

on:
  push:
    paths: ["agent-verse-backend/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["agent-verse-backend/**"]

defaults:
  run:
    working-directory: agent-verse-backend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy app
      - name: Unit tests + coverage gate
        run: uv run pytest -m "not integration" --cov-fail-under=80

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Integration tests (real Postgres + Redis via testcontainers)
        run: uv run pytest -m integration

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Dependency audit
        run: uvx pip-audit --strict || true  # report-only until baseline triaged

  openapi-contract:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Publish OpenAPI contract (consumed by the frontend project)
        run: |
          uv run python -c "import json; from app.main import app; print(json.dumps(app.openapi()))" > openapi.json
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: agent-verse-backend/openapi.json
