name: Backend CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: agent-verse-backend

      - name: Run ruff (lint + format check)
        run: uv run ruff check app/ tests/
        working-directory: agent-verse-backend

      - name: Run mypy
        run: uv run mypy app/
        working-directory: agent-verse-backend

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: agent-verse-backend

      - name: Run unit tests (excluding integration)
        run: |
          uv run pytest tests/ \
            --ignore=tests/core/test_pools_integration.py \
            --ignore=tests/db/test_tenancy_integration.py \
            -m "not integration and not slow" \
            --cov=app --cov-report=xml --cov-report=term-missing \
            -q
        working-directory: agent-verse-backend

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: agent-verse-backend/coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests (Real Redis + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentverse
          POSTGRES_PASSWORD: agentverse
          POSTGRES_DB: agentverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: agent-verse-backend

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@localhost:5432/agentverse
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run pytest tests/ \
            -m "integration" \
            --cov=app --cov-report=term-missing \
            -q
        working-directory: agent-verse-backend

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: uv sync
        working-directory: agent-verse-backend

      - name: Run pip-audit
        run: pip-audit --requirement <(uv export --no-hashes) || true
        working-directory: agent-verse-backend

  publish-openapi:
    name: Generate & Publish OpenAPI Schema
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync
        working-directory: agent-verse-backend

      - name: Export OpenAPI schema
        run: |
          uv run python -c "
          import json
          from app.main import create_app
          app = create_app()
          schema = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(schema, f, indent=2)
          print('OpenAPI schema exported to openapi.json')
          "
        working-directory: agent-verse-backend

      - name: Upload OpenAPI schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: agent-verse-backend/openapi.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentverse-backend:${{ github.sha }} .
        working-directory: agent-verse-backend
