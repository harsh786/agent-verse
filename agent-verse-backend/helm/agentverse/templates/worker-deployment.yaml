apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentverse-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: agentverse-worker
    component: worker
    {{- include "agentverse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: agentverse-worker
  template:
    metadata:
      labels:
        app: agentverse-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: {{ include "agentverse.workerImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - celery
            - -A
            - app.scaling.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
            - -Q
            - {{ .Values.worker.queues }}
          envFrom:
            - configMapRef:
                name: agentverse-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentverse-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentverse-secrets
                  key: redis-url
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
