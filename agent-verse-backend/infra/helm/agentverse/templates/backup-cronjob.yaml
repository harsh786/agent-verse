{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "agentverse.fullname" . }}-pg-backup
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.backup.schedule | default "0 2 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: pg-backup
            image: postgres:16-alpine
            imagePullPolicy: IfNotPresent
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.secretName | default "agentverse-secrets" }}
                  key: postgresql-password
            command:
            - /bin/sh
            - -c
            - |
              set -e
              DATE=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/backup/agentverse_${DATE}.sql.gz"
              echo "Starting backup: ${BACKUP_FILE}"
              pg_dump \
                -h {{ .Values.postgresql.host | default "postgres" }} \
                -U {{ .Values.postgresql.username | default "agentverse" }} \
                -d {{ .Values.postgresql.database | default "agentverse" }} \
                --no-password \
                | gzip > "${BACKUP_FILE}"
              echo "Backup complete: $(du -h ${BACKUP_FILE} | cut -f1)"
              # Keep last 7 daily backups
              ls -t /backup/*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -v
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          volumes:
          - name: backup-storage
            {{- if .Values.backup.existingPVC }}
            persistentVolumeClaim:
              claimName: {{ .Values.backup.existingPVC }}
            {{- else }}
            emptyDir: {}
            {{- end }}
{{- end }}
