# AgentVerse Helm Chart Values
# Override any value with: helm install agentverse ./agentverse --set key=value

# ── Global ──────────────────────────────────────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Backend ──────────────────────────────────────────────────────────────────
backend:
  replicaCount: 2
  image:
    repository: agentverse/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    environment: production
    logLevel: INFO
    corsOrigins: "https://app.yourdomain.com"
    dataRetentionDays: "90"
  llm:
    anthropicApiKey: ""
    openaiApiKey: ""
    voyageApiKey: ""
    googleApiKey: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── Worker (Celery) ───────────────────────────────────────────────────────────
worker:
  replicaCount: 2
  image:
    repository: agentverse/backend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  concurrency: 4
  queues: "goals,goals.free,goals.starter,goals.professional,goals.enterprise,schedules,maintenance,goals_dlq"
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    queueThreshold: 5

# ── Beat scheduler ────────────────────────────────────────────────────────────
beat:
  image:
    repository: agentverse/backend
    tag: latest
    pullPolicy: IfNotPresent

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  replicaCount: 2
  image:
    repository: agentverse/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  env:
    apiUrl: "https://api.yourdomain.com"
    grafanaUrl: "https://grafana.yourdomain.com"

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: agentverse
    password: ""  # REQUIRED: set via --set postgresql.auth.password=...
    database: agentverse
  primary:
    persistence:
      enabled: true
      size: 20Gi

# ── PgBouncer ────────────────────────────────────────────────────────────────
pgbouncer:
  enabled: true
  poolMode: transaction
  maxClientConn: 1000
  defaultPoolSize: 50

# ── Redis ────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: true
    password: ""  # REQUIRED: set via --set redis.auth.password=...
  master:
    persistence:
      enabled: true
      size: 5Gi

# ── MinIO ────────────────────────────────────────────────────────────────────
minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: ""  # REQUIRED

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: api.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
    - host: app.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: agentverse-tls
      hosts:
        - api.yourdomain.com
        - app.yourdomain.com

# ── Observability ─────────────────────────────────────────────────────────────
observability:
  otelEndpoint: ""  # e.g. http://otel-collector:4317
  grafanaUrl: ""
  jaegerUrl: ""

# ── SSO / Keycloak ────────────────────────────────────────────────────────────
keycloak:
  enabled: false
  url: ""
  realm: agentverse
  clientId: agentverse-backend
  clientSecret: ""

# ── SMTP ─────────────────────────────────────────────────────────────────────
smtp:
  host: ""
  port: "587"
  user: ""
  password: ""
  tls: "true"

# ── Integrations ──────────────────────────────────────────────────────────────
slack:
  tenantId: ""
  signingSecret: ""
  botToken: ""

zapier:
  tenantId: ""
  webhookSecret: ""
