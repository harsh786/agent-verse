apiVersion: v1
kind: Secret
metadata:
  name: agentverse-secrets
  namespace: agentverse
  annotations:
    agentverse.io/scope: "dev-only"
    agentverse.io/warning: "Do not include this placeholder Secret in production kustomization."
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://agentverse:CHANGE_ME@postgres:5432/agentverse"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"
  SECRET_KEY: "CHANGE_ME_USE_openssl_rand_-hex_32"
  ANTHROPIC_API_KEY: ""
  # Required by backend-deployment and migration-job for DATABASE_URL env substitution
  POSTGRES_PASSWORD: "CHANGE_ME"
  # Vault/encryption key for at-rest secret encryption
  ENCRYPTION_KEY: "CHANGE_ME_USE_openssl_rand_-hex_32"
