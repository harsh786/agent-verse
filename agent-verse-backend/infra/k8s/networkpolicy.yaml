apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentverse-compute-data-egress
  namespace: agentverse
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - agentverse-backend
          - agentverse-worker
          - agentverse-beat
          - agentverse-db-migration
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentverse-db-ingress
  namespace: agentverse
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - agentverse-backend
                  - agentverse-worker
                  - agentverse-beat
                  - agentverse-db-migration
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentverse-redis-ingress
  namespace: agentverse
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - agentverse-backend
                  - agentverse-worker
                  - agentverse-beat
      ports:
        - protocol: TCP
          port: 6379
