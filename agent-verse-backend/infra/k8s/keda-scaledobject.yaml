apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agentverse-worker-goals
  namespace: agentverse
spec:
  scaleTargetRef:
    name: agentverse-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
  - type: redis
    metadata:
      address: redis-service.agentverse.svc.cluster.local:6379
      listName: celery
      listLength: "5"
      enableTLS: "false"
  - type: cpu
    metricType: Utilization
    metadata:
      value: "70"
