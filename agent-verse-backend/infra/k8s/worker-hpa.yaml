apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentverse-worker-hpa
  namespace: agentverse
  annotations:
    agentverse.io/autoscaling-signal: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentverse-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: agentverse_queue_depth
          selector:
            matchLabels:
              queue: goals
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
