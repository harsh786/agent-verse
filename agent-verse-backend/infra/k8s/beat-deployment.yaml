# RedBeat HA Beat: allows 2 replicas safely — only one fires each task.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentverse-beat
  namespace: agentverse
  labels:
    app: agentverse-beat
    component: beat
spec:
  replicas: 2   # HA with RedBeat distributed lock (was 1)
  selector:
    matchLabels:
      app: agentverse-beat
  template:
    metadata:
      labels:
        app: agentverse-beat
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: beat
          image: ghcr.io/agentverse/backend:latest
          command:
            - celery
            - -A
            - app.scaling.celery_app
            - beat
            - --scheduler=redbeat.RedBeatScheduler
            - --loglevel=info
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentverse-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentverse-secrets
                  key: database-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'celery.*beat' > /dev/null"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
