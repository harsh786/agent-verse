apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agentverse-secrets
  namespace: agentverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: agentverse-production-secrets
    kind: ClusterSecretStore
  target:
    name: agentverse-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: agentverse/production/postgres
        property: password
    - secretKey: DATABASE_URL
      remoteRef:
        key: agentverse/production/database
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: agentverse/production/redis
        property: url
    - secretKey: SECRET_KEY
      remoteRef:
        key: agentverse/production/app
        property: secret-key
    - secretKey: AGENTVERSE_VAULT_KEY
      remoteRef:
        key: agentverse/production/app
        property: vault-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: agentverse/production/providers
        property: anthropic-api-key
