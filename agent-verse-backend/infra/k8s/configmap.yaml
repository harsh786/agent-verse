apiVersion: v1
kind: ConfigMap
metadata:
  name: agentverse-config
  namespace: agentverse
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  APP_NAME: "AgentVerse"
  SERVICE_NAME: "agentverse"
  CORS_ORIGINS: "https://app.agentverse.ai"
  # pgBouncer connection pool URL (used by the backend instead of direct Postgres)
  DATABASE_URL_PGBOUNCER: "postgresql+asyncpg://agentverse:CHANGE_ME@pgbouncer:5432/agentverse"
  # OpenTelemetry
  OTEL_SERVICE_NAME: "agentverse"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
