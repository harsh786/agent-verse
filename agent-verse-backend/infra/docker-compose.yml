# Local development stack for the AgentVerse backend.
# Frontend is a separate project with its own compose; an optional top-level compose
# wires both together for full-stack runs.

name: agentverse-backend

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentverse
      POSTGRES_PASSWORD: agentverse
      POSTGRES_DB: agentverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@postgres:5432/agentverse
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.scaling.celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@postgres:5432/agentverse
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["full"]  # enabled once Celery app lands (Phase 9)

  beat:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.scaling.celery_app", "beat", "--loglevel=info"]
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["full"]  # enabled once Celery app lands (Phase 9)

volumes:
  pgdata:
  redisdata:
