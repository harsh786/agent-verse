# Local development stack for the AgentVerse backend.
# Frontend is a separate project with its own compose; an optional top-level compose
# wires both together for full-stack runs.

name: agentverse-backend

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentverse
      POSTGRES_PASSWORD: agentverse
      POSTGRES_DB: agentverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PgBouncer — connection pool proxy ────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: agentverse
      DB_PASSWORD: agentverse
      DB_NAME: agentverse
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "50"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "5"
      SERVER_IDLE_TIMEOUT: "600"
      CLIENT_IDLE_TIMEOUT: "0"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U agentverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@pgbouncer:6432/agentverse
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: agentverse
      KEYCLOAK_CLIENT_ID: agentverse-backend
      KEYCLOAK_CLIENT_SECRET: "agentverse-backend-secret"
      SSO_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: agentverse-backend
      FRONTEND_URL: http://localhost:5173
      DATA_RETENTION_DAYS: "90"
      AGENTVERSE_DB_SCHEDULE_DISCOVERY: "true"
      # ── LLM providers (set at least one for real goal execution) ──────────
      # ANTHROPIC_API_KEY: sk-ant-...
      # OPENAI_API_KEY: sk-...
      # VOYAGE_API_KEY: pa-...
      # GOOGLE_API_KEY: ...
      # SENTENCE_TRANSFORMERS_MODEL: all-MiniLM-L6-v2  # local CPU embeddings
      # ── A2A (Agent-to-Agent) protocol ─────────────────────────────────────
      # A2A_TENANT_ID: ""          # REQUIRED for /a2a/tasks endpoint
      # A2A_SHARED_SECRET: ""      # HMAC signing secret (empty = dev mode, no auth)
      # ── Slack integration ──────────────────────────────────────────────────
      # SLACK_TENANT_ID: ""        # tenant_id for Slack-originated goals
      # SLACK_SIGNING_SECRET: ""
      # SLACK_BOT_TOKEN: xoxb-...
      # SLACK_APPROVAL_CHANNEL: hitl-approvals
      # ── Zapier integration ─────────────────────────────────────────────────
      # ZAPIER_TENANT_ID: ""       # tenant_id for Zapier-triggered goals
      # ZAPIER_WEBHOOK_SECRET: ""
      # ── IMAP email-to-goal listener ────────────────────────────────────────
      # IMAP_ENABLED: "false"
      # IMAP_HOST: imap.example.com
      # IMAP_PORT: "993"
      # IMAP_USER: goals@example.com
      # IMAP_PASSWORD: ""
      # IMAP_SSL: "true"
      # IMAP_MAILBOX: INBOX
      # IMAP_TENANT_ID: ""
      # ── SMTP outbound email ────────────────────────────────────────────────
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      # SMTP_USER: ""
      # SMTP_PASSWORD: ""
      SMTP_TLS: "false"
      SEARXNG_URL: http://searxng:8080
      EMBEDDING_DIM: "1536"
      FAKE_LLM_WARNING: "WARNING: No LLM API keys set. Agent goals will use FakeProvider and return dummy responses. Set ANTHROPIC_API_KEY or OPENAI_API_KEY."
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
      - "com.agentverse.note=Set ANTHROPIC_API_KEY or OPENAI_API_KEY for real LLM execution"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      keycloak:
        condition: service_started  # Don't block on Keycloak health — it takes 60-90s

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.scaling.celery_app", "worker", "--loglevel=info", "-Q", "goals,goals.free,goals.starter,goals.professional,goals.enterprise,schedules,maintenance,goals_dlq"]
    environment:
      DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@pgbouncer:6432/agentverse
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      # ── LLM providers — set at least one for real goal execution ──
      # ANTHROPIC_API_KEY: sk-ant-...
      # OPENAI_API_KEY: sk-...
      # VOYAGE_API_KEY: pa-...
      # ── Integration env vars ─────────────────────────────────────
      # A2A_TENANT_ID: ""
      # SLACK_TENANT_ID: ""
      # ALERTMANAGER_TENANT_ID: ""
      # DATADOG_TENANT_ID: ""
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.scaling.celery_app", "inspect", "ping", "-d", "celery@$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  beat:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.scaling.celery_app", "beat", "--loglevel=info"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://agentverse:agentverse@pgbouncer:6432/agentverse
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      # ── LLM providers — set at least one for real goal execution ──
      # ANTHROPIC_API_KEY: sk-ant-...
      # OPENAI_API_KEY: sk-...
      # VOYAGE_API_KEY: pa-...
      # ── Integration env vars ─────────────────────────────────────
      # A2A_TENANT_ID: ""
      # SLACK_TENANT_ID: ""
      # ALERTMANAGER_TENANT_ID: ""
      # DATADOG_TENANT_ID: ""
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.scaling.celery_app", "inspect", "ping", "-d", "celery@$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── OpenTelemetry Collector ───────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8889:8889"    # Prometheus metrics exporter
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Jaeger — distributed tracing UI ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger HTTP collector
      - "14250:14250"  # Jaeger gRPC collector
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../agent-verse-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8081/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Prometheus — metrics collection ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: agentverse-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Grafana — metrics dashboards ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: agentverse-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentverse
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  redisdata:
  minio_data:
  jaeger_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
